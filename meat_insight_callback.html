<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 처리 중 | MEAT INSIGHT</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans KR',sans-serif;background:#0d0b09;color:#f0ebe4;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .wrap{text-align:center;padding:40px}
    .logo{width:56px;height:56px;border-radius:14px;background:#c8854a;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;margin:0 auto 24px}
    .title{font-size:20px;font-weight:700;margin-bottom:10px}
    .desc{font-size:14px;color:#8a7e72;margin-bottom:32px}
    .spinner{width:40px;height:40px;border:3px solid rgba(200,133,74,.2);border-top-color:#c8854a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-box{background:#1a1612;border:1px solid rgba(200,80,80,.3);border-radius:12px;padding:20px;color:#e06060;font-size:14px;margin-top:24px;display:none}
    .btn{display:inline-block;margin-top:20px;padding:12px 24px;border-radius:999px;background:#c8854a;color:#fff;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:inherit}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">肉</div>
  <div class="title">로그인 처리 중...</div>
  <div class="desc">잠시만 기다려주세요</div>
  <div class="spinner" id="spinner"></div>
  <div class="error-box" id="error-box">
    <div id="error-msg">오류가 발생했어요.</div>
    <a href="meat_insight_login.html" class="btn" style="margin-top:16px;display:inline-block">다시 시도하기</a>
  </div>
</div>

<script>
  const KAKAO_REST_KEY = '3151d87cf4b5d55777b85a0265d7c789';
  const REDIRECT_URI = 'https://www.aboutmeat.co.kr/meat_insight_callback.html';
  const SUPABASE_URL = 'https://igignylgzjphtnyxhhsd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnaWdueWxnempwaHRueXhoaHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDUyMDAsImV4cCI6MjA4OTA4MTIwMH0.3u5gCw1dnG1YSmrzhN3PGVOMoQ1LBtGw0ToNhSeL42A';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
  }

  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (error) {
      showError('카카오 로그인이 취소됐어요.');
      return;
    }

    if (!code) {
      window.location.href = 'meat_insight_login.html';
      return;
    }

    try {
      // Supabase Edge Function으로 토큰 교환
      const res = await fetch(`${SUPABASE_URL}/functions/v1/kakao-auth`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
      });

      const data = await res.json();

      if (!data?.user) {
        showError('로그인 처리 실패: ' + (data?.error || '알 수 없는 오류'));
        return;
      }

      const user = data.user;

      // Supabase members 저장
      await sb.from('members').upsert({
        kakao_id: user.kakao_id,
        nickname: user.nickname,
        email: user.email,
        profile_image: user.profile_image,
        last_login_at: new Date().toISOString(),
      }, { onConflict: 'kakao_id' });

      localStorage.setItem('meat_user', JSON.stringify(user));
      window.location.href = 'meat_insight_main.html';

    } catch(e) {
      showError('네트워크 오류가 발생했어요. 다시 시도해주세요.');
    }
  }

  handleCallback();
</script>
</body>
</html>
