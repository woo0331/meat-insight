<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 | MEAT INSIGHT</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --bg: #0d0b09;
      --surface: #1a1612;
      --border: #2e2820;
      --accent: #c8854a;
      --accent-light: #e8a96a;
      --text: #f0ebe4;
      --text-muted: #8a7e72;
      --kakao: #FEE500;
      --kakao-text: #191919;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 배경 텍스처 */
    body::before {
      content: '肉';
      position: fixed;
      font-family: 'Noto Serif KR', serif;
      font-size: 40vw;
      font-weight: 900;
      color: rgba(200, 133, 74, 0.03);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    /* 그라디언트 오버레이 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(200, 133, 74, 0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(120, 60, 20, 0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    /* 상단 네비 */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      background: rgba(13, 11, 9, 0.8);
      backdrop-filter: blur(12px);
    }

    .logo-char {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Serif KR', serif;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
    }

    .logo-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    /* 메인 카드 */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }

    /* 카드 상단 장식선 */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .card-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      border: 1px solid rgba(200,133,74,0.3);
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .card-title em {
      font-style: normal;
      color: var(--accent);
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* 혜택 목록 */
    .benefits {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
      padding: 20px;
      background: rgba(200,133,74,0.05);
      border: 1px solid rgba(200,133,74,0.1);
      border-radius: 10px;
    }

    .benefit-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .benefit-item .dot {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* 카카오 로그인 버튼 */
    .kakao-btn {
      width: 100%;
      padding: 16px 20px;
      background: var(--kakao);
      color: var(--kakao-text);
      border: none;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
    }

    .kakao-btn:hover {
      background: #f5dc00;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(254, 229, 0, 0.25);
    }

    .kakao-btn:active {
      transform: translateY(0);
    }

    .kakao-btn svg {
      width: 20px; height: 20px;
    }

    /* 로딩 상태 */
    .kakao-btn.loading {
      opacity: 0.7;
      cursor: not-allowed;
      pointer-events: none;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(25,25,25,0.3);
      border-top-color: var(--kakao-text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 구분선 */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    /* 하단 안내 */
    .notice {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .notice a {
      color: var(--accent);
      text-decoration: none;
    }

    /* 홈으로 링크 */
    .back-home {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-home:hover { color: var(--accent); }

    /* 토스트 메시지 */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { border-color: rgba(200,133,74,0.5); color: var(--accent); }
    .toast.error { border-color: rgba(200,80,80,0.5); color: #e06060; }

    /* 이미 로그인된 경우 */
    .logged-in-box {
      text-align: center;
      padding: 20px 0;
    }

    .logged-in-box .avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      margin: 0 auto 12px;
      display: block;
      object-fit: cover;
    }

    .logged-in-box .name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .logged-in-box .email {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .btn-outline {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
      margin-top: 10px;
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .btn-primary:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
      nav { padding: 16px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="https://www.aboutmeat.co.kr" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <div class="logo-char">肉</div>
      <div>
        <div class="logo-text">MEAT INSIGHT</div>
        <div class="logo-sub">고기의 모든것</div>
      </div>
    </a>
  </nav>

  <div class="login-wrap">
    <div class="login-card">
      <span class="card-tag">회원 전용 서비스</span>

      <!-- 기본 로그인 화면 -->
      <div id="login-view">
        <h1 class="card-title">
          데이터 기반<br>창업 분석, <em>무료</em>로
        </h1>
        <p class="card-desc">
          카카오 계정으로 간편하게 로그인하고<br>
          정육점·고깃집 창업 분석 서비스를 이용하세요.
        </p>

        <div class="benefits">
          <div class="benefit-item">
            <span class="dot"></span>
            <span>창업 진단 결과 저장 및 히스토리 관리</span>
          </div>
          <div class="benefit-item">
            <span class="dot"></span>
            <span>계산기 결과 PDF 리포트 무료 생성</span>
          </div>
          <div class="benefit-item">
            <span class="dot"></span>
            <span>공급 연결 신청 현황 실시간 확인</span>
          </div>
          <div class="benefit-item">
            <span class="dot"></span>
            <span>비대면 컨설팅 자료 다운로드</span>
          </div>
        </div>

        <button class="kakao-btn" id="kakaoLoginBtn" onclick="loginWithKakao()">
          <!-- 카카오 로고 -->
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.62 5.076 4.08 6.516L5.04 21l4.56-2.82c.78.12 1.584.18 2.4.18 5.523 0 10-3.477 10-7.8C22 6.477 17.523 3 12 3z"/>
          </svg>
          카카오로 시작하기
        </button>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">무료 · 1초 로그인</span>
          <div class="divider-line"></div>
        </div>

        <p class="notice">
          로그인 시 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다.<br>
          카카오 계정 외 별도 가입 정보는 저장되지 않습니다.
        </p>
      </div>

      <!-- 로그인 완료 화면 -->
      <div id="logged-in-view" style="display:none;">
        <div class="logged-in-box">
          <img id="userAvatar" src="" alt="프로필" class="avatar" onerror="this.src='https://via.placeholder.com/64x64/c8854a/ffffff?text=M'" />
          <div class="name" id="userName"></div>
          <div class="email" id="userEmail"></div>

          <button class="btn-primary" onclick="goToMain()">
            🥩 메인으로 이동
          </button>
          <button class="btn-outline" onclick="logout()">
            로그아웃
          </button>
        </div>
      </div>
    </div>

    <a href="https://www.aboutmeat.co.kr" class="back-home">
      ← 로그인 없이 둘러보기
    </a>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <script>
    // ─── 설정 ─────────────────────────────────────────────
    const KAKAO_REST_KEY = '3151d87cf4b5d55777b85a0265d7c789';
    const REDIRECT_URI = 'https://www.aboutmeat.co.kr/meat_insight_callback.html';
    const SUPABASE_URL = 'https://igignylgzjphtnyxhhsd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnaWdueWxnempwaHRueXhoaHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDUyMDAsImV4cCI6MjA4OTA4MTIwMH0.3u5gCw1dnG1YSmrzhN3PGVOMoQ1LBtGw0ToNhSeL42A';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── 토스트 ───────────────────────────────────────────
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ─── 카카오 OAuth 리다이렉트 로그인 ──────────────────
    function loginWithKakao() {
      const btn = document.getElementById('kakaoLoginBtn');
      btn.classList.add('loading');
      btn.innerHTML = '<div class="spinner"></div> 이동 중...';
      // 카카오 OAuth 인증 페이지로 리다이렉트
      const kakaoAuthUrl = `https://kauth.kakao.com/oauth/authorize?client_id=${KAKAO_REST_KEY}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code`;
      window.location.href = kakaoAuthUrl;
    }

    // ─── 콜백 처리 (인증 코드 받은 후) ──────────────────
    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (!code) return;

      // URL에서 코드 파라미터 제거
      window.history.replaceState({}, '', window.location.pathname);

      showToast('⏳ 로그인 처리 중...', '');

      try {
        // Supabase Edge Function 또는 직접 토큰 교환
        // REST API 키로 토큰 교환
        const tokenRes = await fetch('https://kauth.kakao.com/oauth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            grant_type: 'authorization_code',
            client_id: KAKAO_REST_KEY,
            redirect_uri: REDIRECT_URI,
            code: code
          })
        });
        const tokenData = await tokenRes.json();

        if (!tokenData.access_token) {
          showToast('❌ 토큰 발급 실패. 다시 시도해주세요.', 'error');
          return;
        }

        // 사용자 정보 가져오기
        const userRes = await fetch('https://kapi.kakao.com/v2/user/me', {
          headers: { 'Authorization': 'Bearer ' + tokenData.access_token }
        });
        const userData = await userRes.json();

        const user = {
          kakao_id: String(userData.id),
          nickname: userData.kakao_account?.profile?.nickname || '사용자',
          email: userData.kakao_account?.email || '',
          profile_image: userData.kakao_account?.profile?.profile_image_url || '',
        };

        // Supabase 저장
        await sb.from('members').upsert({
          kakao_id: user.kakao_id,
          nickname: user.nickname,
          email: user.email,
          profile_image: user.profile_image,
          last_login_at: new Date().toISOString(),
        }, { onConflict: 'kakao_id' });

        // 로컬 저장
        localStorage.setItem('meat_user', JSON.stringify(user));
        showToast('✅ 로그인 성공!', 'success');
        setTimeout(() => showLoggedIn(user), 500);

      } catch(e) {
        console.error(e);
        showToast('❌ 로그인 오류. 다시 시도해주세요.', 'error');
      }
    }

    // ─── 이미 로그인 체크 ─────────────────────────────────
    const savedUser = localStorage.getItem('meat_user');
    if (savedUser) {
      showLoggedIn(JSON.parse(savedUser));
    } else {
      // 콜백 코드 있으면 처리
      handleCallback();
    }

    // ─── 로그인 완료 UI ───────────────────────────────────
    function showLoggedIn(user) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('logged-in-view').style.display = 'block';
      document.getElementById('userName').textContent = user.nickname + ' 님';
      document.getElementById('userEmail').textContent = user.email || '이메일 정보 없음';
      if (user.profile_image) {
        document.getElementById('userAvatar').src = user.profile_image;
      }
    }

    function goToMain() {
      window.location.href = 'https://www.aboutmeat.co.kr';
    }

    function logout() {
      localStorage.removeItem('meat_user');
      location.reload();
    }
  </script>
</body>
</html>
