  <style>
    :root{
      --navy:#0b1f3a;--gold:#b8945a;--gold2:#d4a96a;
      --white:#fff;--off:#f8f6f2;--muted:#6b7280;--line:#e8e2d8;
      --shadow:0 8px 32px rgba(11,31,58,.10);--shadow-lg:0 20px 60px rgba(11,31,58,.16);
      --radius:20px;

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--off);color:var(--navy);overflow-x:hidden;padding-bottom:80px}

    /* NAV */
    .nav{position:sticky;top:0;z-index:100;background:rgba(11,31,58,.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(184,148,90,.25)}
    .nav-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:68px}
    .nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none}
    .nav-logo{width:40px;height:40px;border-radius:10px;background:var(--gold);display:grid;place-items:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--navy)}
    .nav-brand b{display:block;font-size:14px;font-weight:900;color:#fff}
    .nav-brand span{display:block;font-size:11px;color:rgba(255,255,255,.5)}
    .nav-links{display:flex;align-items:center;gap:4px}
    .nav-links a{color:rgba(255,255,255,.75);text-decoration:none;font-size:14px;font-weight:700;padding:8px 14px;border-radius:8px;transition:color .15s}
    .nav-links a:hover{color:#fff}
    .nav-cta{background:var(--gold)!important;color:var(--navy)!important;border-radius:999px!important;padding:9px 18px!important}
    @media(max-width:768px){.nav-links{display:none}}

    /* HERO */
    .hero{background:var(--navy);padding:70px 28px 80px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 400px at 80% 50%,rgba(184,148,90,.12),transparent 60%);pointer-events:none}
    .hero-inner{max-width:1240px;margin:0 auto;display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center;position:relative;z-index:1}
    .hero-label{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;border:1px solid rgba(184,148,90,.3);color:var(--gold);font-size:12px;font-weight:700;margin-bottom:20px}
    .hero h1{font-family:'Playfair Display',serif;font-size:clamp(32px,4.5vw,56px);font-weight:900;color:#fff;line-height:1.1;margin-bottom:20px}
    .hero h1 em{color:var(--gold);font-style:normal}
    .hero-sub{font-size:16px;color:rgba(255,255,255,.6);line-height:1.8;margin-bottom:32px}
    .hero-sub strong{color:var(--gold2)}
    .hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:40px}
    .btn-gold{display:inline-block;padding:15px 28px;border-radius:999px;background:var(--gold);color:var(--navy);font-size:15px;font-weight:900;text-decoration:none;box-shadow:0 4px 20px rgba(184,148,90,.4);transition:opacity .15s}

    .hero-stats{display:flex;gap:32px}
    .hero-stat-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--gold)}
    .hero-stat-label{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
    .hero-cards{display:flex;flex-direction:column;gap:12px}
    .hero-card{background:rgba(255,255,255,.07);border:1px solid rgba(184,148,90,.2);border-radius:14px;padding:18px 22px}
    .hero-card-step{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px}
    .hero-card-title{font-size:15px;font-weight:900;color:#fff;margin-bottom:4px}
    .hero-card-desc{font-size:13px;color:rgba(255,255,255,.5);line-height:1.6}
    @media(max-width:900px){.hero-inner{grid-template-columns:1fr}.hero-cards{display:none}.hero{padding:80px 20px 50px}}

    /* WRAP */
    .wrap{max-width:1240px;margin:0 auto;padding:0 28px}
    @media(max-width:640px){.wrap{padding:0 16px}}

    /* PROCESS */
    .process-section{background:#fff;border-bottom:1px solid var(--line);padding:40px 28px}
    .process-inner{max-width:1240px;margin:0 auto}
    .process-label{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:16px}
    .process-steps{display:grid;grid-template-columns:repeat(6,1fr);gap:0}
    .process-step{padding:16px 12px;text-align:center;border-right:1px solid var(--line);position:relative}
    .process-step:last-child{border-right:none}
    .step-num{width:36px;height:36px;border-radius:10px;background:var(--navy);color:var(--gold);display:grid;place-items:center;font-size:14px;font-weight:900;margin:0 auto 10px}
    .step-label{font-size:13px;font-weight:900;color:var(--navy);margin-bottom:4px}
    .step-sub{font-size:11px;color:var(--muted)}
    @media(max-width:768px){.process-steps{grid-template-columns:repeat(3,1fr)}.process-step{border-bottom:1px solid var(--line)}}

    /* FEATURES */
    .features-section{padding:64px 28px}
    .features-inner{max-width:1240px;margin:0 auto}
    .sec-label{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.5px;margin-bottom:10px}
    .sec-title{font-family:'Playfair Display',serif;font-size:clamp(26px,3.5vw,38px);font-weight:900;color:var(--navy);margin-bottom:12px}
    .sec-sub{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:40px}
    .features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    @media(max-width:900px){.features-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:560px){.features-grid{grid-template-columns:1fr}}

    .feature-link{display:block;text-decoration:none;background:#fff;border-radius:var(--radius);padding:28px;border:2px solid transparent;box-shadow:var(--shadow);transition:border-color .2s,transform .2s,box-shadow .2s;cursor:pointer}
    .feature-link:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .feature-link.dark{background:var(--navy);border-color:var(--gold)}
    .ficon{font-size:32px;margin-bottom:14px}
    .feature-link h3{font-size:17px;font-weight:900;color:var(--navy);margin-bottom:8px}
    .feature-link.dark h3{color:#fff}
    .feature-link p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:14px}
    .feature-link.dark p{color:rgba(255,255,255,.6)}
    .ftag{display:inline-block;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;background:var(--off);color:var(--muted)}
    .feature-link.dark .ftag{background:rgba(184,148,90,.2);color:var(--gold2)}
    .no-link{background:#fff;border-radius:var(--radius);padding:28px;border:2px solid var(--line);box-shadow:var(--shadow);opacity:.7}
    .no-link h3{font-size:17px;font-weight:900;color:var(--navy);margin-bottom:8px}
    .no-link p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:14px}

    /* DATA */
    .data-section{background:var(--navy);padding:64px 28px}
    .data-inner{max-width:1240px;margin:0 auto}
    .data-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:32px}
    @media(max-width:900px){.data-grid{grid-template-columns:1fr 1fr}}
    .data-card{background:rgba(255,255,255,.07);border:1px solid rgba(184,148,90,.15);border-radius:16px;padding:22px}
    .data-icon{font-size:24px;margin-bottom:12px}
    .data-card b{display:block;font-size:15px;font-weight:900;color:#fff;margin-bottom:8px}
    .data-card p{font-size:13px;color:rgba(255,255,255,.5);line-height:1.7}

    /* CASES */
    .cases-section{padding:64px 28px}
    .cases-inner{max-width:1240px;margin:0 auto}
    .cases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px}
    @media(max-width:900px){.cases-grid{grid-template-columns:1fr}}
