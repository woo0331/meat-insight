<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 창업 분석 리포트 | MEAT INSIGHT</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0b1f3a;--gold:#b8945a;--gold2:#d4a96a;--white:#fff;--off:#f8f6f2;--muted:#6b7280;--line:#e8e2d8;--shadow:0 8px 32px rgba(11,31,58,.10);--radius:16px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--off);color:var(--navy)}

    .nav{background:var(--navy);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo{width:36px;height:36px;border-radius:8px;background:var(--gold);display:grid;place-items:center;font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:var(--navy)}
    .nav-brand b{font-size:14px;font-weight:900;color:#fff}
    .nav-back{padding:9px 18px;border-radius:999px;font-size:13px;font-weight:700;text-decoration:none;background:var(--gold);color:var(--navy)}

    .hero{background:var(--navy);padding:40px 28px 32px}
    .hero-inner{max-width:860px;margin:0 auto}
    .hero-label{display:inline-block;padding:4px 14px;border-radius:999px;border:1px solid rgba(184,148,90,.3);color:var(--gold);font-size:12px;font-weight:700;margin-bottom:14px}
    .hero h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:#fff;margin-bottom:6px}
    .hero h1 em{color:var(--gold);font-style:normal}
    .hero-date{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:24px}
    .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .hero-stat{background:rgba(255,255,255,.08);border:1px solid rgba(184,148,90,.2);border-radius:12px;padding:14px 16px}
    .hero-stat-label{font-size:11px;color:rgba(255,255,255,.5);font-weight:700;margin-bottom:6px}
    .hero-stat-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--gold)}
    .hero-stat-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
    @media(max-width:600px){.hero-stats{grid-template-columns:1fr 1fr}}

    .main{max-width:860px;margin:0 auto;padding:28px 24px 60px}
    @media(max-width:640px){.main{padding:20px 16px 60px}}

    .sec{background:#fff;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden}
    .sec-head{background:var(--navy);padding:14px 20px;display:flex;align-items:center;gap:10px}
    .sec-head-icon{font-size:18px}
    .sec-head-title{font-size:15px;font-weight:900;color:#fff}
    .sec-head-sub{font-size:12px;color:var(--gold);margin-left:auto;font-weight:700}

    table{width:100%;border-collapse:collapse}
    tr:nth-child(even){background:var(--off)}
    td{padding:12px 18px;font-size:14px;border-bottom:1px solid var(--line);color:var(--navy)}
    td:last-child{text-align:right;font-weight:700}
    tr:last-child td{border-bottom:none}
    tr.hl{background:linear-gradient(135deg,#f8f4ee,#f0e8d8)!important}
    tr.hl td{font-weight:900}
    tr.hl td:last-child{color:var(--gold);font-size:17px;font-family:'Playfair Display',serif}

    .empty{padding:24px;text-align:center;color:var(--muted);font-size:14px}

    .cta{background:var(--navy);border-radius:var(--radius);padding:28px;text-align:center;margin-top:20px}
    .cta h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#fff;margin-bottom:8px}
    .cta p{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:20px;line-height:1.7}
    .cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn-gold{display:inline-block;padding:13px 28px;border-radius:999px;background:var(--gold);color:var(--navy);font-size:14px;font-weight:900;text-decoration:none}
    .btn-line{display:inline-block;padding:13px 28px;border-radius:999px;border:1.5px solid rgba(255,255,255,.25);color:#fff;font-size:14px;font-weight:700;text-decoration:none}
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="meat_insight_main.html">
    <div class="nav-logo">肉</div>
    <b>MEAT INSIGHT</b>
  </a>
  <a class="nav-back" href="meat_insight_calculator.html">← 계산기로 돌아가기</a>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">내 창업 분석 결과</div>
    <h1><em>내 창업 리포트</em>가<br/>준비됐습니다</h1>
    <div class="hero-date" id="hero-date"></div>
    <div class="hero-stats" id="hero-stats"></div>
  </div>
</div>

<div class="main">

  <div class="sec">
    <div class="sec-head">
      <div class="sec-head-icon">🥩</div>
      <div class="sec-head-title">정육점 매출 분석</div>
      <div class="sec-head-sub" id="sub1"></div>
    </div>
    <table id="t1"></table>
  </div>

  <div class="sec">
    <div class="sec-head">
      <div class="sec-head-icon">🍖</div>
      <div class="sec-head-title">고깃집 매출 분석</div>
      <div class="sec-head-sub" id="sub2"></div>
    </div>
    <table id="t2"></table>
  </div>

  <div class="sec">
    <div class="sec-head">
      <div class="sec-head-icon">📊</div>
      <div class="sec-head-title">메뉴 원가 분석</div>
      <div class="sec-head-sub" id="sub3"></div>
    </div>
    <table id="t3"></table>
  </div>

  <div class="sec">
    <div class="sec-head">
      <div class="sec-head-icon">💰</div>
      <div class="sec-head-title">창업 비용 분석</div>
    </div>
    <table id="t4"></table>
  </div>

  <div class="sec">
    <div class="sec-head">
      <div class="sec-head-icon">⚖️</div>
      <div class="sec-head-title">수율 분석</div>
      <div class="sec-head-sub" id="sub5"></div>
    </div>
    <table id="t5"></table>
  </div>

  <div class="cta">
    <h3>더 정확한 분석이 필요하신가요?</h3>
    <p>지금 보신 결과는 기본 분석입니다.<br/>전문가 비대면 컨설팅으로 맞춤 손익 구조·원가 분석·창업 전략 자료를 받아보세요.</p>
    <div class="cta-btns">
      <a href="meat_insight_apply.html?tab=consulting" class="btn-gold">비대면 컨설팅 신청</a>
      <a href="meat_insight_calculator.html" class="btn-line">계산기 다시 해보기</a>
    </div>
  </div>

</div>

<script>
  var p = new URLSearchParams(location.search);
  function g(k){ return decodeURIComponent(p.get(k)||''); }

  // 날짜
  var now = new Date();
  document.getElementById('hero-date').textContent = now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 기준 분석 결과';

  // 히어로 통계
  document.getElementById('hero-stats').innerHTML =
    '<div class="hero-stat"><div class="hero-stat-label">정육점 예상 월 매출</div><div class="hero-stat-val">'+( g('bRev')||'-')+'</div><div class="hero-stat-sub">순이익 '+(g('bProfit')||'-')+'</div></div>'+
    '<div class="hero-stat"><div class="hero-stat-label">고깃집 예상 월 매출</div><div class="hero-stat-val">'+(g('rRev')||'-')+'</div><div class="hero-stat-sub">순이익 '+(g('rProfit')||'-')+'</div></div>'+
    '<div class="hero-stat"><div class="hero-stat-label">총 창업 비용</div><div class="hero-stat-val">'+(g('sTotal')||'-')+'</div><div class="hero-stat-sub">회수 '+(g('sRecovery')||'-')+'</div></div>';

  function row(a,b,hl){
    return '<tr'+(hl?' class="hl"':'')+'><td>'+a+'</td><td>'+b+'</td></tr>';
  }
  function empty(msg){
    return '<tr><td colspan="2" class="empty">'+msg+'</td></tr>';
  }

  // ① 정육점
  var bRev = g('bRev');
  document.getElementById('sub1').textContent = bRev ? '예상 월 매출 '+bRev : '';
  document.getElementById('t1').innerHTML = bRev ?
    row('일 방문객 수', g('bVis')+'명')+
    row('평균 구매금액', Number(g('bPrice')).toLocaleString()+'원')+
    row('원가율', g('bCost')+'%')+
    row('월 임대료', g('bRent')+'만원')+
    row('월 인건비', g('bLabor')+'만원')+
    row('월 기타비용', g('bEtc')+'만원')+
    row('예상 월 매출', bRev, true)+
    row('예상 순이익', g('bProfit'), true)+
    row('순이익률', g('bMargin'))+
    row('손익분기점 (일 방문)', g('bBep'))
    : empty('계산기에서 정육점 매출을 입력해주세요');

  // ② 고깃집
  var rRev = g('rRev');
  document.getElementById('sub2').textContent = rRev ? '예상 월 매출 '+rRev : '';
  document.getElementById('t2').innerHTML = rRev ?
    row('좌석 수', g('rSeats')+'석')+
    row('객단가', Number(g('rPrice')).toLocaleString()+'원')+
    row('일 회전율', g('rTurn')+'회')+
    row('원가율', g('rCost')+'%')+
    row('예상 월 매출', rRev, true)+
    row('예상 순이익', g('rProfit'), true)+
    row('순이익률', g('rMargin'))+
    row('손익분기 월 매출', g('rBep'))+
    row('1일 최소 방문객', g('rMinVis'))
    : empty('계산기에서 고깃집 매출을 입력해주세요');

  // ③ 메뉴 원가
  var mRate = g('mRate');
  document.getElementById('sub3').textContent = g('mName') || '';
  document.getElementById('t3').innerHTML = mRate ?
    row('메뉴명', g('mName'))+
    row('원가율', mRate)+
    row('1인분 마진', g('mMargin'), true)+
    row('권장 판매가', g('mRecommend'))
    : empty('계산기에서 메뉴 원가를 입력해주세요');

  // ④ 창업 비용
  var sTotal = g('sTotal');
  document.getElementById('t4').innerHTML = sTotal ?
    row('보증금', g('sDep')+'만원')+
    row('권리금', g('sPre')+'만원')+
    row('인테리어', g('sInt')+'만원')+
    row('장비·집기', g('sEqu')+'만원')+
    row('간판·홍보', g('sSign')+'만원')+
    row('초도 물량', g('sStock')+'만원')+
    row('운전 자금', g('sOp')+'만원')+
    row('기타', g('sEtc')+'만원')+
    row('총 창업 비용', sTotal, true)+
    row('투자 회수 기간', g('sRecovery'))
    : empty('계산기에서 창업 비용을 입력해주세요');

  // ⑤ 수율
  var yNetW = g('yNetW');
  document.getElementById('sub5').textContent = g('yName') || '';
  document.getElementById('t5').innerHTML = yNetW ?
    row('부위명', g('yName'))+
    row('실 판매 가능 중량', yNetW)+
    row('총 판매 매출', g('yRevenue'))+
    row('총 마진', g('yMargin'), true)+
    row('마진율', g('yMarginPct'))
    : empty('계산기에서 수율을 입력해주세요');
</script>
</body>
</html>
